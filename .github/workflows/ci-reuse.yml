name: CI Reusable

on:
  workflow_call:
    inputs:
      certify:
        description: Run the full certification (replay + journey)
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install plugin
        run: |
          mkdir -p "${HOME}/.config/nvim"
          ln -sfn "${{ github.workspace }}/nvim" "${HOME}/.config/nvim"

      - name: Verify
        run: bash tools/verify.sh
        if: ${{ inputs.certify }}
